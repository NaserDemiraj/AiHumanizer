<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HumanFlow</title>
    <!-- Office.js from the official CDN (required by the add-in runtime) -->
    <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
    <link rel="stylesheet" href="taskpane.css" />
  </head>
  <body>
    <header class="hf-w-header">
      <div class="hf-w-logo"><span class="hf-w-mark">↑</span> HumanFlow</div>
    </header>

    <div id="settings" class="hf-w-card">
      <label class="hf-w-label" for="apiKey">API key</label>
      <input id="apiKey" class="hf-w-input" placeholder="hf_live_..." />
      <label class="hf-w-label" for="baseUrl">Server URL</label>
      <input id="baseUrl" class="hf-w-input" placeholder="http://localhost:3000" />
      <button id="saveSettings" class="hf-w-secondary">Save settings</button>
    </div>

    <div class="hf-w-card">
      <label class="hf-w-label" for="operation">Operation</label>
      <select id="operation" class="hf-w-input"></select>
      <input id="option" class="hf-w-input" placeholder="Language" hidden />

      <button id="run" class="hf-w-run">Run on selected text</button>
      <p class="hf-w-hint">Select text in your document first, then Run. The result replaces your selection.</p>

      <div id="error" class="hf-w-error" hidden></div>
      <div id="status" class="hf-w-status" hidden></div>
    </div>

    <script src="taskpane.js"></script>
  </body>
</html>
